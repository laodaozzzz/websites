                // 从真实字典中获取该字对应的词语
                // 极少数字如果没匹配到，则只显示自己（避免报错或出现虚拟词）
                const words = wordDictionary[char] || [char];
                
                const wordsHtml = words.map(w => `<span class="word-tag">${w}</span>`).join('');
                tooltip.innerHTML = `<span class="tooltip-title">${char}</span> 常用词：${wordsHtml}`;

                // 显示 tooltip 以便获取实际宽高
                tooltip.classList.add('show');
                
                // 计算位置
                const rect = this.getBoundingClientRect();
                const tooltipRect = tooltip.getBoundingClientRect();
                const scrollX = window.scrollX || window.pageXOffset;
                const scrollY = window.scrollY || window.pageYOffset;
                
                // 默认显示在汉字上方
                let topPos = rect.top + scrollY - tooltipRect.height - 12;
                let leftPos = rect.left + scrollX + (rect.width / 2) - (tooltipRect.width / 2);

                // 边界碰撞检测：如果上方空间不够，就显示在下方
                if (rect.top - tooltipRect.height - 12 < 0) {
                    topPos = rect.bottom + scrollY + 12;
                }
                
                // 如果左/右侧超出屏幕边缘，则向内收紧
                if (leftPos < 10) leftPos = 10;
                if (leftPos + tooltipRect.width > document.body.clientWidth - 10) {
                    leftPos = document.body.clientWidth - tooltipRect.width - 10;
                }

                tooltip.style.left = leftPos + 'px';
                tooltip.style.top = topPos + 'px';
            });

            container.appendChild(charDiv);
        });

        // 点击页面空白处，隐藏提示框并取消选中状态
        document.addEventListener('click', function() {
            document.querySelectorAll('.char-box').forEach(el => el.classList.remove('active'));
            tooltip.classList.remove('show');
        });

    </script>
</body>
</html>
